<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>超级用户后台 | 少昊导航</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050d14;
        --panel: rgba(8, 20, 29, 0.92);
        --panel-soft: rgba(14, 35, 48, 0.78);
        --border: rgba(151, 226, 219, 0.18);
        --text: #e8f3f5;
        --muted: #95aab4;
        --heading: #f5fbfc;
        --brand: #0f766e;
        --brand-strong: #9ff7ed;
        --danger: #ff8b8b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 28px;
        background:
          radial-gradient(circle at 80% 10%, rgba(15, 118, 110, 0.2), transparent 30%),
          linear-gradient(135deg, #07121b, #02070d 58%, #081a27);
        color: var(--text);
        font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }

      body.is-login {
        display: grid;
        place-items: center;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .shell--login {
        width: min(432px, calc(100vw - 32px));
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 20px 22px;
      }

      body.is-login .topbar {
        display: none;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--brand-strong);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.18em;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.4rem);
        color: var(--heading);
      }

      h2 {
        color: var(--heading);
      }

      .muted {
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .button {
        min-height: 44px;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel-soft);
        color: var(--heading);
        cursor: pointer;
        text-decoration: none;
      }

      .button.primary {
        border-color: rgba(159, 247, 237, 0.28);
        background: linear-gradient(135deg, rgba(15, 118, 110, 0.98), rgba(34, 160, 148, 0.78));
      }

      .button.full {
        width: 100%;
        justify-content: center;
      }

      .button.danger {
        color: var(--danger);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(320px, 0.8fr) minmax(0, 1.2fr);
        align-items: start;
        gap: 18px;
      }

      .card {
        padding: 20px;
        display: grid;
        align-content: start;
        align-items: start;
        gap: 14px;
      }

      .login-card {
        position: relative;
        gap: 18px;
        padding: 27px 25px 25px;
        background:
          radial-gradient(circle at 55% 0%, rgba(15, 118, 110, 0.18), transparent 40%),
          rgba(5, 16, 24, 0.94);
      }

      .login-card__home {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        text-decoration: none;
        font-size: 1.35rem;
        line-height: 1;
      }

      .login-card__head {
        display: grid;
        gap: 8px;
        text-align: center;
        padding: 8px 32px 0;
      }

      .login-card__head h1 {
        font-size: clamp(1.8rem, 6.3vw, 2.7rem);
        line-height: 1.05;
      }

      .login-card__head .muted {
        font-size: 0.95rem;
      }

      .login-card__divider {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
        color: var(--muted);
      }

      .login-card__divider::before,
      .login-card__divider::after {
        content: "";
        height: 1px;
        background: var(--border);
      }

      .login-card__register {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        color: var(--muted);
      }

      .form {
        display: grid;
        gap: 12px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
        gap: 12px;
      }

      .url-control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: end;
      }

      .select-control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(130px, 0.45fr);
        gap: 10px;
        align-items: end;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--heading);
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(2, 10, 16, 0.78);
        color: var(--text);
        outline: none;
      }

      .login-card input {
        min-height: 52px;
        border-radius: 14px;
        padding: 11px 14px;
        background: rgba(34, 52, 75, 0.78);
        border-color: rgba(154, 184, 219, 0.34);
        font-size: 1rem;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .site-list {
        display: grid;
        gap: 10px;
        max-height: 650px;
        overflow: auto;
        padding-right: 4px;
      }

      .site-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.035);
      }

      .site-item strong {
        display: block;
        color: var(--heading);
        font-size: 1.05rem;
      }

      .site-item span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status {
        min-height: 1.5em;
        color: var(--muted);
      }

      .login-card .status {
        text-align: center;
        line-height: 1.6;
      }

      .login-card .button {
        min-height: 40px;
      }

      .login-card .button.full {
        min-height: 52px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 840px) {
        body {
          padding: 16px;
        }

        .topbar,
        .layout,
        .grid-2 {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .url-control,
        .select-control {
          grid-template-columns: 1fr;
        }

        .login-card {
          padding: 23px 16px 20px;
        }
      }
    </style>
  </head>
  <body class="is-login">
    <main class="shell shell--login">
      <header class="panel topbar">
        <div>
          <p class="eyebrow">ADMIN</p>
          <h1>超级用户后台</h1>
        </div>
        <div class="actions">
          <a class="button" href="/">返回首页</a>
          <button class="button hidden" type="button" data-action="sign-out">退出</button>
        </div>
      </header>

      <section class="panel card login-card" data-view="login">
        <a class="button login-card__home" href="/" aria-label="返回首页">×</a>
        <div class="login-card__head">
          <p class="eyebrow">ADMIN</p>
          <h1>登录到后台</h1>
          <p class="muted">管理主页公共网站数据</p>
        </div>
        <div class="form">
          <label>邮箱
            <input type="email" data-field="email" autocomplete="email" placeholder="admin@example.com">
          </label>
          <label>密码
            <input type="password" data-field="password" autocomplete="current-password" placeholder="输入密码">
          </label>
          <button class="button primary full" type="button" data-action="sign-in">登录后台</button>
          <p class="status" data-role="login-status"></p>
        </div>
        <div class="login-card__divider"><span>或</span></div>
        <p class="login-card__register">
          <span>首次使用？</span>
          <button class="button" type="button" data-action="sign-up">创建管理员账号</button>
        </p>
      </section>

      <section class="layout hidden" data-view="admin">
        <article class="panel card">
          <div>
            <p class="eyebrow">EDIT SITE</p>
            <h2 data-role="form-title">添加主页网站</h2>
          </div>
          <div class="form">
            <div class="url-control">
              <label>网址
                <input data-field="url" placeholder="https://example.com">
              </label>
              <button class="button" type="button" data-action="identify-site">一键识别</button>
            </div>
            <div class="grid-2">
              <label>名称
                <input data-field="name">
              </label>
              <label>图标
                <input data-field="icon">
              </label>
            </div>
            <div class="select-control">
              <label>分类
                <input data-field="category">
              </label>
              <select class="button" data-role="category-picker">
                <option value="">选择已有</option>
              </select>
            </div>
            <div class="select-control">
              <label>标签
                <input data-field="tags" placeholder="用逗号分隔">
              </label>
              <select class="button" data-role="tag-picker">
                <option value="">选择已有</option>
              </select>
            </div>
            <label>别名
              <input data-field="aliases" placeholder="用逗号分隔">
            </label>
            <label>说明
              <textarea data-field="description"></textarea>
            </label>
            <div class="actions">
              <button class="button primary" type="button" data-action="save-site">保存网站</button>
              <button class="button" type="button" data-action="reset-form">清空</button>
            </div>
            <p class="status" data-role="admin-status"></p>
          </div>
        </article>

        <article class="panel card">
          <div class="actions">
            <div>
              <p class="eyebrow">PUBLIC SITES</p>
              <h2>主页网站</h2>
            </div>
            <button class="button" type="button" data-action="reload-sites">刷新</button>
          </div>
          <div class="grid-2">
            <label>搜索
              <input data-role="site-search" placeholder="搜名称、网址、分类、标签">
            </label>
            <label>分类
              <select class="button" data-role="site-category"></select>
            </label>
          </div>
          <p class="status" data-role="site-count"></p>
          <div class="site-list" data-role="site-list"></div>
        </article>
      </section>
    </main>

    <script>
      const SUPABASE_URL = "https://zfvwrnuenurxauvvfsuw.supabase.co";
      const SUPABASE_KEY = "sb_publishable_TQuGLzZKqPmkr3_d_LCyAw_aA9RAsOy";
      const SESSION_KEY = "nav-admin.session";
      const ADMIN_EMAIL = "mr.king.office@foxmail.com";

      const state = {
        accessToken: "",
        refreshToken: "",
        userEmail: "",
        editingId: "",
        sites: [],
        siteQuery: "",
        siteCategory: "all",
      };

      const fields = {};
      for (const node of document.querySelectorAll("[data-field]")) {
        fields[node.dataset.field] = node;
      }

      const views = {
        login: document.querySelector('[data-view="login"]'),
        admin: document.querySelector('[data-view="admin"]'),
      };
      const shell = document.querySelector(".shell");
      const loginStatus = document.querySelector('[data-role="login-status"]');
      const adminStatus = document.querySelector('[data-role="admin-status"]');
      const siteList = document.querySelector('[data-role="site-list"]');
      const siteSearch = document.querySelector('[data-role="site-search"]');
      const siteCategory = document.querySelector('[data-role="site-category"]');
      const categoryPicker = document.querySelector('[data-role="category-picker"]');
      const tagPicker = document.querySelector('[data-role="tag-picker"]');
      const siteCount = document.querySelector('[data-role="site-count"]');
      const signOutButton = document.querySelector('[data-action="sign-out"]');

      siteSearch.addEventListener("input", () => {
        state.siteQuery = siteSearch.value.trim().toLocaleLowerCase();
        renderSites();
      });

      siteCategory.addEventListener("change", () => {
        state.siteCategory = siteCategory.value;
        renderSites();
      });

      categoryPicker.addEventListener("change", () => {
        if (!categoryPicker.value) return;
        fields.category.value = categoryPicker.value;
        categoryPicker.value = "";
      });

      tagPicker.addEventListener("change", () => {
        if (!tagPicker.value) return;
        appendListValue(fields.tags, tagPicker.value);
        tagPicker.value = "";
      });

      document.addEventListener("click", (event) => {
        const action = event.target.closest("[data-action]")?.dataset.action;
        if (!action) return;

        if (action === "sign-in") signIn();
        if (action === "sign-up") signUp();
        if (action === "sign-out") signOut();
        if (action === "save-site") saveSite();
        if (action === "identify-site") identifySite();
        if (action === "reset-form") resetForm();
        if (action === "reload-sites") loadSites();
        if (action === "pin-site") pinSite(event.target.closest("[data-id]")?.dataset.id);
        if (action === "edit-site") editSite(event.target.closest("[data-id]")?.dataset.id);
        if (action === "delete-site") deleteSite(event.target.closest("[data-id]")?.dataset.id);
      });

      restoreSession();
      showLogin();

      async function restoreSession() {
        try {
          const session = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
          if (!session?.accessToken) return;

          state.accessToken = session.accessToken;
          state.refreshToken = session.refreshToken || "";
          state.userEmail = session.userEmail || "";
          await ensureAdmin();
          showAdmin();
          await loadSites();
        } catch {
          signOut();
        }
      }

      async function signIn() {
        setLoginStatus("正在登录...");
        try {
          const session = await requestAuth("/auth/v1/token?grant_type=password", {
            email: normalizeEmail(fields.email.value),
            password: fields.password.value,
          });
          const activeSession = session.session || session;
          state.accessToken = activeSession.access_token || "";
          state.refreshToken = activeSession.refresh_token || "";
          state.userEmail = normalizeEmail(activeSession.user?.email || session.user?.email || fields.email.value);
          if (!state.accessToken) throw new Error("没有获得有效会话。");

          await ensureAdmin();
          localStorage.setItem(SESSION_KEY, JSON.stringify({
            accessToken: state.accessToken,
            refreshToken: state.refreshToken,
            userEmail: state.userEmail,
          }));
          fields.password.value = "";
          showAdmin();
          await loadSites();
        } catch (error) {
          setLoginStatus(`登录失败：${getErrorMessage(error)}`);
        }
      }

      async function signUp() {
        const email = normalizeEmail(fields.email.value);
        const password = fields.password.value;
        if (!email || !password) {
          setLoginStatus("请输入邮箱和你要设置的密码。");
          return;
        }

        if (email !== ADMIN_EMAIL) {
          setLoginStatus("这个邮箱不在管理员白名单，不能从后台创建账号。");
          return;
        }

        setLoginStatus("正在创建账号...");
        try {
          await requestAuth("/auth/v1/signup", { email, password });
          fields.password.value = "";
          setLoginStatus("账号已提交创建。请先到邮箱完成确认，然后回到这里登录。");
        } catch (error) {
          setLoginStatus(`创建失败：${getErrorMessage(error)}`);
        }
      }

      function normalizeEmail(value) {
        return String(value || "").trim().toLocaleLowerCase();
      }

      async function ensureAdmin() {
        const rows = await requestRest(`/rest/v1/admin_users?email=eq.${encodeURIComponent(state.userEmail)}&select=email`, {
          auth: true,
        });
        if (!Array.isArray(rows) || rows.length === 0) {
          throw new Error("当前账号不是管理员。");
        }
      }

      async function loadSites() {
        setAdminStatus("正在加载...");
        const rows = await requestRest("/rest/v1/public_sites?select=id,name,url,category,tags,icon,description,aliases,sort_order&order=sort_order.asc,created_at.asc", {
          auth: false,
        });
        state.sites = Array.isArray(rows) ? rows : [];
        renderCategoryFilter();
        renderFormPickers();
        renderSites();
        setAdminStatus(`已加载 ${state.sites.length} 个网站。`);
      }

      async function saveSite() {
        const payload = getSitePayload();
        if (!payload.name || !payload.url || !payload.category) {
          setAdminStatus("请填写名称、网址和分类。");
          return;
        }

        setAdminStatus("正在保存...");
        if (state.editingId) {
          await requestRest(`/rest/v1/public_sites?id=eq.${encodeURIComponent(state.editingId)}`, {
            method: "PATCH",
            auth: true,
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify({ ...payload, updated_at: new Date().toISOString() }),
          });
        } else {
          await shiftExistingSitesDown();
          await requestRest("/rest/v1/public_sites", {
            method: "POST",
            auth: true,
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify({
              ...payload,
              id: `site-${Date.now()}`,
              sort_order: 0,
            }),
          });
        }

        resetForm();
        await loadSites();
        setAdminStatus("已保存。");
      }

      async function shiftExistingSitesDown() {
        const updates = state.sites.map((site, index) => requestRest(`/rest/v1/public_sites?id=eq.${encodeURIComponent(site.id)}`, {
          method: "PATCH",
          auth: true,
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({
            sort_order: Number.isFinite(site.sort_order) ? site.sort_order + 1 : index + 1,
            updated_at: new Date().toISOString(),
          }),
        }));
        await Promise.all(updates);
      }

      function identifySite() {
        const url = normalizeUrl(fields.url.value);
        if (!url) {
          setAdminStatus("请先填写有效网址。");
          return;
        }

        const parsedUrl = new URL(url);
        const matchedSite = findSiteByUrl(url);
        fields.url.value = url;

        if (matchedSite) {
          fields.name.value = matchedSite.name || fields.name.value;
          fields.category.value = matchedSite.category || fields.category.value;
          fields.icon.value = matchedSite.icon || fields.icon.value;
          fields.tags.value = Array.isArray(matchedSite.tags) ? matchedSite.tags.join(", ") : fields.tags.value;
          fields.aliases.value = Array.isArray(matchedSite.aliases) ? matchedSite.aliases.join(", ") : fields.aliases.value;
          fields.description.value = matchedSite.description || fields.description.value;
          setAdminStatus("已从现有主页网站识别并填充信息。");
          return;
        }

        fields.name.value = inferNameFromHost(parsedUrl.hostname);
        fields.icon.value = `${parsedUrl.origin}/favicon.ico`;
        if (!fields.aliases.value.trim()) {
          fields.aliases.value = parsedUrl.hostname.replace(/^www\./i, "");
        }
        setAdminStatus("已根据网址填充站点名、图标和别名建议。");
      }

      async function deleteSite(id) {
        if (!id || !confirm("确定删除这个主页网站？")) return;
        setAdminStatus("正在删除...");
        await requestRest(`/rest/v1/public_sites?id=eq.${encodeURIComponent(id)}`, {
          method: "DELETE",
          auth: true,
          headers: { Prefer: "return=minimal" },
        });
        if (state.editingId === id) resetForm();
        await loadSites();
        setAdminStatus("已删除。");
      }

      async function pinSite(id) {
        const target = state.sites.find((site) => site.id === id);
        if (!target) return;

        setAdminStatus("正在置顶...");
        const reorderedSites = getPinnedSiteOrder(target);
        await Promise.all(reorderedSites.map((site, index) => requestRest(`/rest/v1/public_sites?id=eq.${encodeURIComponent(site.id)}`, {
          method: "PATCH",
          auth: true,
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({
            sort_order: index,
            updated_at: new Date().toISOString(),
          }),
        })));
        await loadSites();
        setAdminStatus(`已置顶 ${target.name}，并将 ${target.category} 分类放到最前。`);
      }

      function editSite(id) {
        const site = state.sites.find((item) => item.id === id);
        if (!site) return;

        state.editingId = site.id;
        fields.name.value = site.name || "";
        fields.url.value = site.url || "";
        fields.category.value = site.category || "";
        fields.icon.value = site.icon || "";
        fields.tags.value = Array.isArray(site.tags) ? site.tags.join(", ") : "";
        fields.aliases.value = Array.isArray(site.aliases) ? site.aliases.join(", ") : "";
        fields.description.value = site.description || "";
        document.querySelector('[data-role="form-title"]').textContent = "编辑主页网站";
      }

      function resetForm() {
        state.editingId = "";
        for (const key of ["name", "url", "category", "icon", "tags", "aliases", "description"]) {
          fields[key].value = "";
        }
        document.querySelector('[data-role="form-title"]').textContent = "添加主页网站";
      }

      function getSitePayload() {
        return {
          name: fields.name.value.trim(),
          url: normalizeUrl(fields.url.value),
          category: fields.category.value.trim(),
          icon: fields.icon.value.trim(),
          tags: splitList(fields.tags.value),
          aliases: splitList(fields.aliases.value),
          description: fields.description.value.trim(),
        };
      }

      function findSiteByUrl(url) {
        const normalizedUrl = normalizeUrl(url);
        const host = getComparableHost(normalizedUrl);
        return state.sites.find((site) => {
          if (site.id === state.editingId) return false;
          const siteUrl = normalizeUrl(site.url || "");
          return siteUrl === normalizedUrl || getComparableHost(siteUrl) === host;
        });
      }

      function getComparableHost(value) {
        try {
          return new URL(value).hostname.replace(/^www\./i, "").toLocaleLowerCase();
        } catch {
          return "";
        }
      }

      function inferNameFromHost(hostname) {
        const hostParts = String(hostname || "").replace(/^www\./i, "").split(".");
        return hostParts[0] || hostname;
      }

      function getPinnedSiteOrder(target) {
        const categoryOrder = getCategoryOrderWithPinned(target.category);
        const order = [];

        for (const category of categoryOrder) {
          const categorySites = state.sites.filter((site) => site.category === category);
          if (category === target.category) {
            order.push(target, ...categorySites.filter((site) => site.id !== target.id));
          } else {
            order.push(...categorySites);
          }
        }

        return order;
      }

      function getCategoryOrderWithPinned(category) {
        const categories = [];
        for (const site of state.sites) {
          if (site.category && !categories.includes(site.category)) {
            categories.push(site.category);
          }
        }

        return [category, ...categories.filter((item) => item !== category)];
      }

      function renderSites() {
        const sites = getFilteredSites();
        siteCount.textContent = `显示 ${sites.length} / ${state.sites.length} 个网站`;
        siteList.innerHTML = sites.map((site) => `
          <div class="site-item" data-id="${escapeHTML(site.id)}">
            <div>
              <strong>${escapeHTML(site.name)}</strong>
              <span>${escapeHTML(site.category)} · ${escapeHTML(site.url)}</span>
            </div>
            <div class="actions">
              <button class="button" type="button" data-action="pin-site">置顶</button>
              <button class="button" type="button" data-action="edit-site">编辑</button>
              <button class="button danger" type="button" data-action="delete-site">删除</button>
            </div>
          </div>
        `).join("");
      }

      function renderCategoryFilter() {
        const categories = ["all", ...new Set(state.sites.map((site) => site.category).filter(Boolean))];
        if (!categories.includes(state.siteCategory)) {
          state.siteCategory = "all";
        }

        siteCategory.innerHTML = categories.map((category) => `
          <option value="${escapeHTML(category)}"${category === state.siteCategory ? " selected" : ""}>
            ${category === "all" ? "全部分类" : escapeHTML(category)}
          </option>
        `).join("");
      }

      function renderFormPickers() {
        const categories = getExistingCategories();
        const tags = getExistingTags();
        categoryPicker.innerHTML = '<option value="">选择已有</option>' + categories.map((category) => `
          <option value="${escapeHTML(category)}">${escapeHTML(category)}</option>
        `).join("");
        tagPicker.innerHTML = '<option value="">选择已有</option>' + tags.map((tag) => `
          <option value="${escapeHTML(tag)}">${escapeHTML(tag)}</option>
        `).join("");
      }

      function getExistingCategories() {
        return uniqueSorted(state.sites.map((site) => site.category));
      }

      function getExistingTags() {
        return uniqueSorted(state.sites.flatMap((site) => Array.isArray(site.tags) ? site.tags : []));
      }

      function appendListValue(input, value) {
        const items = splitList(input.value);
        const normalizedValue = String(value || "").trim();
        if (!normalizedValue) return;

        const hasValue = items.some((item) => item.toLocaleLowerCase() === normalizedValue.toLocaleLowerCase());
        input.value = (hasValue ? items : [...items, normalizedValue]).join(", ");
      }

      function uniqueSorted(values) {
        const seen = new Set();
        return values
          .map((value) => String(value || "").trim())
          .filter((value) => {
            const key = value.toLocaleLowerCase();
            if (!value || seen.has(key)) return false;
            seen.add(key);
            return true;
          })
          .sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
      }

      function getFilteredSites() {
        return state.sites.filter((site) => {
          if (state.siteCategory !== "all" && site.category !== state.siteCategory) {
            return false;
          }

          if (!state.siteQuery) {
            return true;
          }

          const haystack = [
            site.name,
            site.url,
            site.category,
            site.description,
            ...(Array.isArray(site.tags) ? site.tags : []),
            ...(Array.isArray(site.aliases) ? site.aliases : []),
          ].join(" ").toLocaleLowerCase();

          return haystack.includes(state.siteQuery);
        });
      }

      function showAdmin() {
        views.login.classList.add("hidden");
        views.admin.classList.remove("hidden");
        signOutButton.classList.remove("hidden");
        document.body.classList.remove("is-login");
        shell.classList.remove("shell--login");
      }

      function signOut() {
        state.accessToken = "";
        state.refreshToken = "";
        state.userEmail = "";
        localStorage.removeItem(SESSION_KEY);
        views.login.classList.remove("hidden");
        views.admin.classList.add("hidden");
        signOutButton.classList.add("hidden");
        showLogin();
      }

      function showLogin() {
        views.login.classList.remove("hidden");
        views.admin.classList.add("hidden");
        signOutButton.classList.add("hidden");
        document.body.classList.add("is-login");
        shell.classList.add("shell--login");
      }

      async function requestAuth(path, body) {
        return requestSupabase(path, {
          method: "POST",
          body: JSON.stringify(body),
        }, false);
      }

      async function requestRest(path, options = {}) {
        return requestSupabase(path, options, Boolean(options.auth));
      }

      async function requestSupabase(path, options = {}, authed = false) {
        const headers = {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${authed ? state.accessToken : SUPABASE_KEY}`,
          "Content-Type": "application/json",
          ...(options.headers || {}),
        };
        const response = await fetch(`${SUPABASE_URL}${path}`, {
          method: options.method || "GET",
          headers,
          body: options.body,
        });
        const text = await response.text();
        const payload = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(payload?.msg || payload?.message || response.statusText);
        }
        return payload;
      }

      function normalizeUrl(value) {
        try {
          const raw = String(value || "").trim();
          if (!raw) return "";

          const url = new URL(/^https?:\/\//i.test(raw) ? raw : `https://${raw}`);
          return url.protocol === "http:" || url.protocol === "https:" ? url.href : "";
        } catch {
          return "";
        }
      }

      function splitList(value) {
        return [...new Set(value.split(/[,，、\s]+/g).map((item) => item.trim()).filter(Boolean))];
      }

      function setLoginStatus(message) {
        loginStatus.textContent = message;
      }

      function setAdminStatus(message) {
        adminStatus.textContent = message;
      }

      function getErrorMessage(error) {
        const message = error instanceof Error && error.message ? error.message : "";
        return translateErrorMessage(message);
      }

      function translateErrorMessage(message) {
        if (!message) {
          return "未知错误";
        }

        if (/email address .* is invalid|invalid email|email.*invalid/i.test(message)) {
          return "邮箱地址格式无效，请检查是否拼写正确。";
        }

        if (/invalid login credentials|invalid credentials/i.test(message)) {
          return "邮箱或密码不正确。";
        }

        if (/email not confirmed|not confirmed|confirm/i.test(message)) {
          return "邮箱还没有完成确认，请先到邮箱点击确认链接。";
        }

        if (/already registered|already exists|user already registered|duplicate/i.test(message)) {
          return "这个邮箱已经注册过，请直接登录。";
        }

        if (/password.*weak|weak password|password.*short/i.test(message)) {
          return "密码强度不够，请换一个更长或更复杂的密码。";
        }

        if (/rate limit|too many requests/i.test(message)) {
          return "请求太频繁，请稍后再试。";
        }

        return message;
      }

      function escapeHTML(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[char]));
      }
    </script>
  </body>
</html>
